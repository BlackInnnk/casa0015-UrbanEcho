name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-release-apk:
    name: Build release APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create optional MQTT config from repository secrets
        env:
          MQTT_HOST: ${{ secrets.MQTT_HOST }}
          MQTT_PORT: ${{ secrets.MQTT_PORT }}
          MQTT_USER: ${{ secrets.MQTT_USER }}
          MQTT_PASS: ${{ secrets.MQTT_PASS }}
          MQTT_TOPIC_PREFIX: ${{ secrets.MQTT_TOPIC_PREFIX }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          host = os.environ.get("MQTT_HOST", "").strip()
          if not host:
              print("No MQTT secrets configured; building with placeholder config.")
              raise SystemExit(0)

          config = {
              "host": host,
              "port": int(os.environ.get("MQTT_PORT", "1883") or "1883"),
              "username": os.environ.get("MQTT_USER", ""),
              "password": os.environ.get("MQTT_PASS", ""),
              "topicPrefix": os.environ.get("MQTT_TOPIC_PREFIX", "urbanecho/places"),
          }
          output = Path("assets/config/mqtt_config.json")
          output.parent.mkdir(parents=True, exist_ok=True)
          output.write_text(json.dumps(config, indent=2))
          print("Created MQTT config from GitHub Secrets.")
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build Android release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: urbanecho-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publish GitHub Release for tags
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
